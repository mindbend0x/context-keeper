# =============================================================================
# docker-compose.staging.yml — Production/staging deployment (Dokploy-compatible)
#
# Runs the full stack: SurrealDB (standalone) + Context Keeper MCP server.
# Uses the remote storage backend so SurrealDB data persists independently.
#
# Environment variables are injected by the deployment platform (Dokploy).
# See .env.staging.example for the full list.
# =============================================================================

services:
  # ── SurrealDB ──────────────────────────────────────────────────────────────
  surrealdb:
    image: surrealdb/surrealdb:v3
    user: "0"
    command: start --user root --pass root rocksdb:/data/srdb
    volumes:
      - surrealdb-data:/data
    restart: unless-stopped

  # ── Context Keeper MCP Server ──────────────────────────────────────────────
  context-keeper-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      STORAGE_BACKEND: "remote:ws://surrealdb:8000"
      MCP_TRANSPORT: "http"
      MCP_HTTP_PORT: "3000"
      MCP_HTTP_HOST: "0.0.0.0"
      # Auth — set MCP_AUTH_TOKENS via the deployment platform, or
      # set MCP_ALLOW_INSECURE_HTTP=1 to opt in to unauthenticated mode.
      MCP_AUTH_TOKENS: "${MCP_AUTH_TOKENS:-}"
      MCP_ALLOW_INSECURE_HTTP: "${MCP_ALLOW_INSECURE_HTTP:-}"
      # LLM — omit keys to use mock extraction (no API calls)
      OPENAI_API_URL: "${OPENAI_API_URL:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      EMBEDDING_DIMS: "${EMBEDDING_DIMS:-1536}"
      EXTRACTION_MODEL: "${EXTRACTION_MODEL:-gpt-4o-mini}"
      EMBEDDING_API_URL: "${EMBEDDING_API_URL:-}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-}"
      SURREAL_USER: "root"
      SURREAL_PASS: "root"
    depends_on:
      - surrealdb
    restart: unless-stopped

volumes:
  surrealdb-data:
