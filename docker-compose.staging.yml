# =============================================================================
# docker-compose.staging.yml — Staging deployment for Hetzner devbox
#
# Runs the full stack: SurrealDB (standalone) + Context Keeper MCP server.
# Uses the remote storage backend so SurrealDB data persists independently.
#
# Usage:
#   docker compose -f docker-compose.staging.yml up -d
#   docker compose -f docker-compose.staging.yml logs -f
#   docker compose -f docker-compose.staging.yml down
# =============================================================================

services:
  # ── SurrealDB ──────────────────────────────────────────────────────────────
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --user root --pass root rocksdb:/data/srdb
    volumes:
      - surrealdb-data:/data
    ports:
      - "127.0.0.1:8000:8000"   # Only expose locally — MCP server connects internally
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Context Keeper MCP Server ──────────────────────────────────────────────
  context-keeper-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:3000:3000"     # Publicly accessible MCP HTTP endpoint
    environment:
      # Connect to the standalone SurrealDB via WebSocket
      STORAGE_BACKEND: "remote:ws://surrealdb:8000"
      # MCP transport
      MCP_TRANSPORT: "http"
      MCP_HTTP_PORT: "3000"
      # LLM configuration — loaded from .env
      OPENAI_API_URL: "${OPENAI_API_URL:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      EMBEDDING_DIMS: "${EMBEDDING_DIMS:-1536}"
      EXTRACTION_MODEL: "${EXTRACTION_MODEL:-gpt-4o-mini}"
    depends_on:
      surrealdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  surrealdb-data:
