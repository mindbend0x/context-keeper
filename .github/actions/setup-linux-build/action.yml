name: Setup Linux build (clang, mold, SSL)
description: Install toolchain deps expected by .cargo/config.toml on self-hosted Linux runners.

runs:
  using: composite
  steps:
    - name: Install system dependencies
      shell: bash
      env:
        CC: clang-18
        CXX: clang++-18
      run: |
        set -euo pipefail
        if [[ "${RUNNER_OS}" != "Linux" ]]; then
          exit 0
        fi
        if ! command -v clang-18 &>/dev/null; then
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends lsb-release wget software-properties-common gnupg
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          CODENAME=$(lsb_release -sc)
          echo "deb http://apt.llvm.org/${CODENAME}/ llvm-toolchain-${CODENAME}-18 main" | sudo tee /etc/apt/sources.list.d/llvm-18.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-18
        fi
        sudo ln -sf "$(command -v clang-18)" /usr/local/bin/clang
        sudo ln -sf "$(command -v clang++-18)" /usr/local/bin/clang++
        sudo apt-get install -y --no-install-recommends pkg-config libssl-dev
        if ! command -v mold &>/dev/null; then
          MOLD_VERSION=2.35.1
          curl -fsSL "https://github.com/rui314/mold/releases/download/v${MOLD_VERSION}/mold-${MOLD_VERSION}-x86_64-linux.tar.gz" \
            | sudo tar -xz --strip-components=1 -C /usr/local
        fi
        clang-18 --version
        mold --version
