name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `context-keeper add --text "..."`
        2. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, storage backend, transport, etc.
      placeholder: |
        - OS: macOS 15.1 (arm64)
        - context-keeper version: 0.1.0
        - Storage: rocksdb
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant logs or error messages.
      render: shell
    validations:
      required: false
