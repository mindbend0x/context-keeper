name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: [self-hosted, linux, fzc]
    steps:
      - uses: actions/checkout@v4
      - name: Install mold linker
        run: |
          if ! command -v mold &>/dev/null; then
            MOLD_VERSION=2.35.1
            curl -fsSL "https://github.com/rui314/mold/releases/download/v${MOLD_VERSION}/mold-${MOLD_VERSION}-x86_64-linux.tar.gz" \
              | sudo tar -xz --strip-components=1 -C /usr/local
          fi
          mold --version
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  fmt:
    name: Format
    runs-on: [self-hosted, linux, fzc]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  check:
    name: Clippy
    needs: fmt
    runs-on: [self-hosted, linux, fzc]
    steps:
      - uses: actions/checkout@v4
      - name: Install mold linker
        run: |
          if ! command -v mold &>/dev/null; then
            MOLD_VERSION=2.35.1
            curl -fsSL "https://github.com/rui314/mold/releases/download/v${MOLD_VERSION}/mold-${MOLD_VERSION}-x86_64-linux.tar.gz" \
              | sudo tar -xz --strip-components=1 -C /usr/local
          fi
          mold --version
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  test:
    name: Test
    needs: fmt
    runs-on: [self-hosted, linux, fzc]
    steps:
      - uses: actions/checkout@v4
      - name: Install mold linker
        run: |
          if ! command -v mold &>/dev/null; then
            MOLD_VERSION=2.35.1
            curl -fsSL "https://github.com/rui314/mold/releases/download/v${MOLD_VERSION}/mold-${MOLD_VERSION}-x86_64-linux.tar.gz" \
              | sudo tar -xz --strip-components=1 -C /usr/local
          fi
          mold --version
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
