name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CC: clang-18
  CXX: clang++-18
  CARGO_BUILD_JOBS: "2"
  NUM_JOBS: "2"

jobs:
  setup:
    name: Setup
    runs-on: [self-hosted, linux, fzc]
    steps:
      - name: Install system dependencies
        run: |
          if ! command -v clang-18 &>/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends lsb-release wget software-properties-common gnupg
            wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
            CODENAME=$(lsb_release -sc)
            echo "deb http://apt.llvm.org/${CODENAME}/ llvm-toolchain-${CODENAME}-18 main" | sudo tee /etc/apt/sources.list.d/llvm-18.list
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends clang-18
          fi
          sudo ln -sf "$(command -v clang-18)" /usr/local/bin/clang
          sudo ln -sf "$(command -v clang++-18)" /usr/local/bin/clang++
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev
          if ! command -v mold &>/dev/null; then
            MOLD_VERSION=2.35.1
            curl -fsSL "https://github.com/rui314/mold/releases/download/v${MOLD_VERSION}/mold-${MOLD_VERSION}-x86_64-linux.tar.gz" \
              | sudo tar -xz --strip-components=1 -C /usr/local
          fi
          clang-18 --version
          mold --version

  fmt:
    name: Format
    needs: setup
    runs-on: [self-hosted, linux, fzc]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  ci:
    name: CI
    needs: [setup, fmt]
    runs-on: [self-hosted, linux, fzc]
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: >-
          cargo clippy
          -p context-keeper-core
          -p context-keeper-rig
          -p context-keeper-surreal
          -p context-keeper-mcp
          -p context-keeper-cli
          --all-targets -- -D warnings
      - name: Test
        run: >-
          cargo test
          -p context-keeper-core
          -p context-keeper-rig
          -p context-keeper-surreal
          -p context-keeper-mcp
          -p context-keeper-cli
