name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CC: clang-18
  CXX: clang++-18
  CARGO_BUILD_JOBS: "2"
  NUM_JOBS: "2"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  ci:
    name: CI
    needs: fmt
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-linux-build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: >-
          cargo clippy
          -p context-keeper-core
          -p context-keeper-rig
          -p context-keeper-surreal
          -p context-keeper-mcp
          -p context-keeper-cli
          --all-targets -- -D warnings
      - name: Test
        run: >-
          cargo test
          -p context-keeper-core
          -p context-keeper-rig
          -p context-keeper-surreal
          -p context-keeper-mcp
          -p context-keeper-cli
