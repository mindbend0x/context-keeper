name: Benchmark

on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      config:
        description: "Benchmark config file path"
        default: "crates/context-keeper-bench/benches/quality.yaml"
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  bench-llm:
    name: LLM Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build bench binary
        run: cargo build -p context-keeper-bench --release

      - name: Run quality benchmark
        env:
          OPENAI_API_URL: ${{ secrets.OPENAI_API_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          CONFIG="${{ github.event.inputs.config || 'crates/context-keeper-bench/benches/quality.yaml' }}"
          cargo run -p context-keeper-bench --release -- \
            --config "$CONFIG" \
            --output bench-results.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.run_number }}
          path: bench-results.json
          retention-days: 90

  bench-pr-comment:
    name: PR Benchmark Comment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run unit bench tests
        run: cargo test -p context-keeper-bench

      - name: Post results comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) return;

            const body = `### Bench Check ✅\n\nAll \`context-keeper-bench\` unit tests passed.\n\n` +
              `Run \`cargo run -p context-keeper-bench -- --config crates/context-keeper-bench/benches/quality.yaml\` ` +
              `locally with \`OPENAI_API_KEY\` set for full LLM benchmarks.`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body,
            });
