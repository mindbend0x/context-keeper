name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-linux-build
        if: runner.os == 'Linux'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu' && runner.arch != 'ARM64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Build binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p context-keeper-mcp
          cargo build --release --target ${{ matrix.target }} -p context-keeper-cli

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/context-keeper-mcp dist/context-keeper-mcp-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/context-keeper dist/context-keeper-cli-${{ matrix.target }}

      - name: Generate per-binary SHA-256 sidecars
        working-directory: dist
        run: |
          set -euo pipefail
          if command -v sha256sum >/dev/null 2>&1; then
            SHA_CMD="sha256sum"
          else
            # macOS fallback — mimic the `sha256sum` output format
            SHA_CMD="shasum -a 256"
          fi
          for f in context-keeper-mcp-${{ matrix.target }} context-keeper-cli-${{ matrix.target }}; do
            $SHA_CMD "$f" > "$f.sha256"
            echo "Wrote $f.sha256: $(cat "$f.sha256")"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate combined checksum manifest
        working-directory: artifacts
        run: |
          set -euo pipefail
          # Hash every released binary artifact (exclude pre-existing .sha256 sidecars
          # and the manifest file itself so the release is self-describing and
          # reproducibly verifiable with `sha256sum -c SHA256SUMS`).
          shopt -s nullglob
          files=()
          for f in *; do
            case "$f" in
              *.sha256|SHA256SUMS|checksums-sha256.txt) continue ;;
            esac
            files+=("$f")
          done
          sha256sum "${files[@]}" | sort -k2 > SHA256SUMS
          # Keep the legacy filename as a symlink-style copy for backward compatibility.
          cp SHA256SUMS checksums-sha256.txt
          echo "---- SHA256SUMS ----"
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute checksums from binaries
        run: |
          set -euo pipefail
          echo "SHA_MACOS_ARM64=$(sha256sum artifacts/context-keeper-cli-aarch64-apple-darwin | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_MACOS_X64=$(sha256sum artifacts/context-keeper-cli-x86_64-apple-darwin | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_LINUX_ARM64=$(sha256sum artifacts/context-keeper-cli-aarch64-unknown-linux-gnu | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "SHA_LINUX_X64=$(sha256sum artifacts/context-keeper-cli-x86_64-unknown-linux-gnu | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Render formula and push to tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          sed \
            -e "s/@@VERSION@@/${VERSION}/g" \
            -e "s/@@SHA_MACOS_ARM64@@/${SHA_MACOS_ARM64}/g" \
            -e "s/@@SHA_MACOS_X64@@/${SHA_MACOS_X64}/g" \
            -e "s/@@SHA_LINUX_ARM64@@/${SHA_LINUX_ARM64}/g" \
            -e "s/@@SHA_LINUX_X64@@/${SHA_LINUX_X64}/g" \
            Formula/context-keeper.rb.template > formula-out.rb

          cat formula-out.rb

          git clone https://x-access-token:${TAP_REPO_TOKEN}@github.com/mindbend0x/homebrew-context-keeper.git tap
          cp formula-out.rb tap/Formula/context-keeper.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/context-keeper.rb
          git diff --cached --quiet && echo "Formula unchanged, skipping push" && exit 0
          git commit -m "context-keeper ${VERSION}"
          git push

  publish-npm:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    # NODE_AUTH_TOKEN must be set for the whole job so setup-node can write .npmrc
    # when registry-url is used. Putting the token only on `npm publish` steps leaves
    # the registry unauthenticated and causes ENEEDAUTH.
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          always-auth: true

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify npm auth
        run: |
          set -euo pipefail
          test -n "${NODE_AUTH_TOKEN:-}" && echo "Token present (len=${#NODE_AUTH_TOKEN})" || { echo "NODE_AUTH_TOKEN MISSING"; exit 1; }
          echo "--- ~/.npmrc (redacted) ---"
          sed 's/_authToken=.*/_authToken=<redacted>/' ~/.npmrc || echo "(no ~/.npmrc)"
          echo "--- npm whoami ---"
          npm whoami
          echo "--- npm access list packages @context-keeper ---"
          npm access list packages @context-keeper || true

      - name: Stage binaries and stamp versions
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          cp artifacts/context-keeper-mcp-aarch64-apple-darwin    npm/darwin-arm64/context-keeper-mcp
          cp artifacts/context-keeper-mcp-x86_64-apple-darwin     npm/darwin-x64/context-keeper-mcp
          cp artifacts/context-keeper-mcp-aarch64-unknown-linux-gnu npm/linux-arm64/context-keeper-mcp
          cp artifacts/context-keeper-mcp-x86_64-unknown-linux-gnu  npm/linux-x64/context-keeper-mcp

          chmod +x npm/*/context-keeper-mcp

          # Generate a SHA256SUMS manifest keyed by platform-tag that the
          # wrapper script verifies at runtime. Format: "<hex>  <platform-tag>".
          #
          # Using platform-tag (not a file path) means the manifest is stable
          # across packaging layouts and the wrapper can look up the expected
          # hash without parsing file paths.
          MANIFEST="npm/context-keeper-mcp/SHA256SUMS"
          : > "$MANIFEST"
          for pair in \
            "darwin-arm64:npm/darwin-arm64/context-keeper-mcp" \
            "darwin-x64:npm/darwin-x64/context-keeper-mcp" \
            "linux-arm64:npm/linux-arm64/context-keeper-mcp" \
            "linux-x64:npm/linux-x64/context-keeper-mcp"; do
            tag="${pair%%:*}"
            bin="${pair#*:}"
            hash="$(sha256sum "$bin" | awk '{print $1}')"
            echo "${hash}  ${tag}" >> "$MANIFEST"
          done
          echo "---- npm SHA256SUMS manifest ----"
          cat "$MANIFEST"

          for pkg_json in npm/*/package.json; do
            sed -i "s/@@VERSION@@/${VERSION}/g" "$pkg_json"
          done

      - name: Publish platform packages
        run: |
          for dir in ./npm/darwin-arm64 ./npm/darwin-x64 ./npm/linux-arm64 ./npm/linux-x64; do
            echo "Publishing ${dir}..."
            npm publish "$dir" --access public
          done

      - name: Publish main package
        run: npm publish ./npm/context-keeper-mcp --access public

  bench-release:
    name: Release Benchmark
    runs-on: [self-hosted, fzc]
    environment: benchmark
    continue-on-error: true
    env:
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-linux-build
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2

      - name: Build bench binary
        run: cargo build -p context-keeper-bench --release

      - name: Run benchmark
        env:
          OPENAI_API_URL: ${{ secrets.OPENAI_API_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cargo run -p context-keeper-bench --release -- \
            --config crates/context-keeper-bench/benches/quality.yaml \
            --output bench-results.json \
            --html bench-dashboard.html

      - uses: actions/upload-artifact@v4
        with:
          name: bench-dashboard
          path: |
            bench-dashboard.html
            bench-results.json
          retention-days: 365

  publish-dashboard:
    name: Publish Benchmark Dashboard
    needs: [bench-release, release]
    runs-on: ubuntu-latest
    if: always() && needs.bench-release.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: bench-dashboard
          path: dashboard

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dashboard/bench-dashboard.html

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dashboard
          destination_dir: bench
          keep_files: true

  publish-crates:
    name: Publish crates.io
    needs: release
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish in dependency order
        run: |
          set -euo pipefail
          cargo publish -p context-keeper-core
          sleep 20
          cargo publish -p context-keeper-rig
          cargo publish -p context-keeper-surreal
